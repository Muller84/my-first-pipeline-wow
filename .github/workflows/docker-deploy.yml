name: Package Docker Image
 
on:
  push:
    branches: [ main ]
 
permissions:
  contents: read
  packages: write # Required to write securely to your GitHub Packages list
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository files
        uses: actions/checkout@v4
 
      # Converts username to lowercase so Docker registry doesn't fail on capital letters
      - name: Downcase Repo Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'
 
      - name: Initialize Docker Build Engine
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub
 
      - name: Compile and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/my-first-pipeline:latest
